<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TETRIS PRO — Ultimate Arcade Edition</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
  <div class="game-container">
    <!-- HEADER -->
    <header class="game-header">
      <h1>TETRIS <span>PRO</span></h1>
      <p>ULTIMATE ARCADE EDITION</p>
      <button id="themeToggle" class="theme-btn"><i data-lucide="sun-moon"></i></button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="game-main">
      <!-- GAME BOARD -->
      <div class="board-wrapper">
        <canvas id="boardCanvas" width="300" height="600"></canvas>
        <div id="gameStatus" class="overlay hidden">
          <div class="overlay-text"></div>
          <div class="overlay-subtext"></div>
        </div>
      </div>

      <!-- SIDEBAR / INFO -->
      <div class="game-sidebar">
        <div class="preview-group">
          <label>NEXT</label>
          <canvas id="nextCanvas" width="100" height="100"></canvas>
        </div>
        <div class="preview-group">
          <label>HOLD</label>
          <canvas id="holdCanvas" width="100" height="100"></canvas>
        </div>

        <div class="stats-panel">
          <div class="stat-item">
            <span>SCORE</span>
            <strong id="scoreDisplay">000000</strong>
          </div>
          <div class="stat-item">
            <span>LINES</span>
            <strong id="linesDisplay">0</strong>
          </div>
          <div class="stat-item">
            <span>LEVEL</span>
            <strong id="levelDisplay">1</strong>
          </div>
          <div class="stat-item">
            <span>HIGH</span>
            <strong id="highScoreDisplay">0</strong>
          </div>
        </div>

        <div class="control-buttons">
          <button id="startBtn" class="btn primary">PLAY</button>
          <button id="pauseBtn" class="btn">PAUSE</button>
          <button id="resetGameBtn" class="btn danger">RESET</button>
          <button id="muteBtn" class="btn icon-btn"><i data-lucide="volume-2"></i></button>
        </div>
      </div>
    </main>

    <!-- MOBILE CONTROLS -->
    <div class="mobile-controls">
      <div class="ctrl-row">
        <button id="btn-move-left" class="ctrl-btn">◀</button>
        <button id="btn-rotate" class="ctrl-btn">🔄</button>
        <button id="btn-move-right" class="ctrl-btn">▶</button>
      </div>
      <div class="ctrl-row">
        <button id="btn-hold" class="ctrl-btn">📥</button>
        <button id="btn-soft" class="ctrl-btn">▼</button>
        <button id="btn-hard" class="ctrl-btn">⏷</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
