<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playful Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="playful-bg" aria-hidden="true">
        <div class="emoji-bubble emoji-1">🎉</div>
        <div class="emoji-bubble emoji-2">✨</div>
        <div class="emoji-bubble emoji-3">😍</div>
    </div>
    <div class="game-shell">
    <div class="left-panel">
        <div class="stat-card stat-joy">
            <span class="label">Joy • 🎨</span>
            <h2 id="score">0</h2>
        </div>
        <div class="stat-card stat-lines">
            <span class="label">Line Clears • ✂️</span>
            <h2 id="lines">0</h2>
        </div>
        <div class="stat-card stat-stage">
            <span class="label">Mood Stage • 🧩</span>
            <h2 id="level">1</h2>
        </div>
    </div>
    <div class="game-stage">
        <canvas id="game" width="300" height="600"></canvas>
        <div class="overlay hidden" id="overlay">
            <h1>GAME OVER</h1>
            <p>Your feelings overflowed ✨</p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>
    <div class="right-panel">
        <div class="preview-box">
            <h3>Next • ✨</h3>
            <canvas id="next" width="120" height="120"></canvas>
        </div>
        <div class="preview-box">
            <h3>Hold • 🧸</h3>
            <canvas id="hold" width="120" height="120"></canvas>
        </div>
    </div>
</div>
<div class="controls">
    <button id="startBtn">▶ Start</button>
    <button id="pauseBtn">⏸ Pause</button>
    <button id="resetBtn">🔄 Reset</button>
    <button id="holdBtn" class="hold-btn" aria-label="Hold piece">🤗 Hold</button>
    <button id="themeBtn" class="theme-btn" aria-pressed="false" aria-label="Toggle theme">
        <span class="theme-icon" aria-hidden="true">🌙</span>
        <span class="theme-text">Theme</span>
    </button>
</div>
    <!-- On-screen touch controls for mobile -->
    <div class="touch-controls" id="touchControls" aria-hidden="false">
        <button id="tc-left" class="tc-btn" aria-label="Move left">◀</button>
        <button id="tc-rotate" class="tc-btn" aria-label="Rotate">⤴︎</button>
        <button id="tc-right" class="tc-btn" aria-label="Move right">▶</button>
        <button id="tc-soft" class="tc-btn" aria-label="Soft drop">▼</button>
        <button id="tc-hard" class="tc-btn tc-hard" aria-label="Hard drop">⤓</button>
    </div>
<!-- How-to section removed per request -->
<script src="app.js"></script>
</body>
</html>
